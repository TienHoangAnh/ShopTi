<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopTi Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="brand">ShopTi Admin</div>
      <a href="#" data-page="dashboard" class="active">Dashboard</a>
      <a href="#" data-page="products">Products</a>
      <a href="#" data-page="orders">Orders</a>
      <a href="#" data-page="users">Users</a>
      <a href="#" data-page="vouchers">Vouchers</a>
      <a href="/">Back to store</a>
    </aside>
    <main class="admin-main">
      <div id="admin-content">
        <p class="text-secondary">Loading...</p>
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-box"></div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    function getToken() { return localStorage.getItem('token'); }
    function request(path, options = {}) {
      const url = path.startsWith('http') ? path : API_BASE + path;
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      const token = getToken();
      if (token) headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, { ...options, headers }).then(async (res) => {
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || res.statusText);
        return data;
      });
    }
    const api = {
      get: (path) => request(path),
      post: (path, body) => request(path, { method: 'POST', body: JSON.stringify(body) }),
      put: (path, body) => request(path, { method: 'PUT', body: JSON.stringify(body || {}) }),
      delete: (path) => request(path, { method: 'DELETE' }),
    };
  </script>
  <script src="/admin/admin.js"></script>
</body>
</html>
